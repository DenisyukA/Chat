<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Pentagon Messenger</title>
    <style>
        :root { --bg: #0f0f0f; --side: #181818; --active: #2b5278; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
        .chat-item:hover { background: #222; }
        .chat-item.active { background: var(--active); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }

        /* MAIN CHAT */
        .main-container { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; word-wrap: break-word; }
        .msg.mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #212121; border-bottom-left-radius: 2px; }
        .msg .sender-info { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; }

        .input-bar { padding: 15px; background: var(--side); display: flex; gap: 12px; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; }
        button.icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; transition: 0.2s; }
        button.icon-btn:hover { color: #5bc0de; }

        /* AUTH & MODALS */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--side); padding: 40px; border-radius: 12px; width: 100%; max-width: 360px; text-align: center; }
        .auth-box input { width: 100%; margin-bottom: 12px; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; }
        .auth-box button { width: 100%; padding: 12px; background: #007bff; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #settings-modal { display: none; position: absolute; top: 60px; left: 20px; background: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 500; width: 260px; }

        @media (max-width: 600px) {
            .sidebar { width: 70px; }
            .sidebar span, .sidebar-header #my-nick { display: none; }
            .chat-item { justify-content: center; padding: 10px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title">Вхід</h2>
            <input type="text" id="auth-user" placeholder="@username (унікальний)">
            <input type="text" id="auth-nick" placeholder="Нікнейм (що бачать всі)" style="display:none">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button onclick="handleAuth()" id="auth-btn">Увійти</button>
            <p onclick="toggleAuthMode()" style="cursor:pointer; font-size: 13px; color: #888; margin-top: 20px;">Немає акаунту? Реєстрація</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span id="my-nick" style="font-weight: bold; color: #5bc0de;">...</span>
            <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
        </div>
        <div class="chat-list" id="chat-list">
            <div class="chat-item active" onclick="switchChat('global', this)">
                <div class="avatar" style="background:#007bff">G</div>
                <span>Глобальний чат</span>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div id="settings-modal">
            <h4 style="margin-top:0">Налаштування</h4>
            <label style="font-size:12px; color:#888">Ваш нікнейм:</label>
            <input type="text" id="set-nick" style="width:100%; margin: 5px 0 15px; padding:8px; background:#111; border:1px solid #444; color:#fff; border-radius:4px;">
            <label style="font-size:12px; color:#888">Колір повідомлень:</label>
            <input type="color" id="set-color" style="width:100%; height:40px; border:none; background:none; cursor:pointer; margin-bottom:15px;">
            <button onclick="saveSettings()" style="width:100%; padding:10px; background:#28a745; border:none; color:#fff; border-radius:4px; cursor:pointer">Зберегти</button>
            <button onclick="logout()" style="width:100%; margin-top:10px; padding:8px; background:none; border:1px solid #dc3545; color:#dc3545; border-radius:4px; cursor:pointer">Вийти</button>
        </div>

        <div id="messages"></div>

        <div class="input-bar">
            <input type="file" id="file-input" style="display:none" onchange="uploadMedia(this)" accept="image/*">
            <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
            <input type="text" id="msg-input" placeholder="Повідомлення..." autocomplete="off">
            <button class="icon-btn" onclick="send()" id="send-btn" style="color: #007bff;">➤</button>
        </div>
    </div>

    <script>
        let me = JSON.parse(localStorage.getItem('p_user')) || null;
        let activeChat = 'global';
        let socket = null;
        let isRegister = false;

        if (me) init();

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? 'Реєстрація' : 'Вхід';
            document.getElementById('auth-nick').style.display = isRegister ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isRegister ? 'Зареєструватись' : 'Увійти';
        }

        async function handleAuth() {
            const username = document.getElementById('auth-user').value.trim();
            const password = document.getElementById('auth-pass').value;
            const nickname = document.getElementById('auth-nick').value.trim();

            const route = isRegister ? '/api/register' : '/api/login';
            const body = { username, password, nickname };

            try {
                const res = await fetch(window.location.origin + route, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (res.ok) {
                    if (isRegister) {
                        alert("Успіх! Тепер увійдіть.");
                        toggleAuthMode();
                    } else {
                        me = data;
                        localStorage.setItem('p_user', JSON.stringify(me));
                        init();
                    }
                } else alert(data.error);
            } catch(e) { alert("Сервер недоступний"); }
        }

        function init() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-nick').innerText = me.nickname;
            document.getElementById('set-nick').value = me.nickname;
            document.getElementById('set-color').value = me.color;

            socket = io();
            socket.emit('join', { username: me.username });

            loadHistory();

            socket.on('new_msg', (data) => {
                const isGlobal = !data.recipient && activeChat === 'global';
                const isPrivate = data.recipient && (data.sender === activeChat || data.sender === me.username);
                if (isGlobal || isPrivate) appendMsg(data);
            });

            socket.on('update_online', (users) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = `<div class="chat-item ${activeChat === 'global' ? 'active' : ''}" onclick="switchChat('global', this)">
                    <div class="avatar" style="background:#007bff">G</div><span>Глобальний чат</span></div>`;
                
                users.forEach(u => {
                    if (u === me.username) return;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChat === u ? 'active' : ''}`;
                    div.onclick = () => switchChat(u, div);
                    div.innerHTML = `<div class="avatar" style="background:#444">${u[0].toUpperCase()}</div><span>${u}</span>`;
                    list.appendChild(div);
                });
            });
        }

        async function loadHistory() {
            const res = await fetch(window.location.origin + `/api/messages?user=${me.username}&other=${activeChat}`);
            const data = await res.json();
            document.getElementById('messages').innerHTML = '';
            data.forEach(appendMsg);
        }

        function switchChat(target, el) {
            activeChat = target;
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            loadHistory();
        }

        function appendMsg(m) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            const isMine = (m.sender === me.username);
            div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
            
            let content = `<span class="sender-info" style="color:${m.color}">${m.sender}</span>`;
            if (m.type === 'image') {
                content += `<img src="${m.file}" style="max-width:100%; border-radius:8px; margin-top:5px; cursor:zoom-in" onclick="window.open('${m.file}')">`;
            } else {
                content += `<span class="text">${m.text}</span>`;
            }
            
            div.innerHTML = content;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function uploadMedia(input) {
            const file = input.files[0];
            if (!file) return;
            document.getElementById('send-btn').innerText = "⏳";

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                socket.emit('send_msg', {
                    sender: me.username,
                    recipient: activeChat === 'global' ? null : activeChat,
                    text: "", 
                    file: data.url,
                    type: 'image',
                    color: me.color
                });
            } catch (e) { alert("Помилка завантаження файлу"); }
            document.getElementById('send-btn').innerText = "➤";
            input.value = "";
        }

        function send() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;
            socket.emit('send_msg', {
                sender: me.username,
                recipient: activeChat === 'global' ? null : activeChat,
                text: text,
                color: me.color,
                type: 'text'
            });
            input.value = '';
        }

        function toggleSettings() {
            const m = document.getElementById('settings-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        async function saveSettings() {
            const nickname = document.getElementById('set-nick').value.trim();
            const color = document.getElementById('set-color').value;
            const res = await fetch(window.location.origin + '/api/update_profile', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: me.username, nickname, color })
            });
            if (res.ok) {
                me.nickname = nickname; me.color = color;
                localStorage.setItem('p_user', JSON.stringify(me));
                location.reload();
            }
        }

        function logout() {
            localStorage.removeItem('p_user');
            location.reload();
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') send(); });
    </script>
</body>
</html>
