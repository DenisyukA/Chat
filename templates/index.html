<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Secure Comms</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }

        /* Екран логіну */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1e1e1e; padding: 20px; }
        .login-box { background: #2a2a2a; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        .login-box input, .login-box button { width: 100%; margin-bottom: 15px; padding: 12px; border-radius: 4px; border: none; font-size: 16px; }

        /* Основний інтерфейс чату */
        #main-app { display: none; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; width: 100%; }
        .header { padding: 15px; background: #1e1e1e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        .chat-container { display: flex; flex: 1; overflow: hidden; }

        /* Список онлайн юзерів */
        .sidebar { width: 150px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding: 10px; }
        .sidebar h4 { margin-top: 0; font-size: 14px; color: #888; }
        .user-online { cursor: pointer; padding: 8px; border-radius: 4px; margin-bottom: 5px; font-size: 14px; background: #2a2a2a; }
        .user-online:hover { background: #007bff; }
        .user-online.selected { background: #28a745; font-weight: bold; }

        /* Зона повідомлень */
        #messages { flex: 1; padding: 15px; overflow-y: auto; background: #121212; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; background: #2a2a2a; border-radius: 8px; word-wrap: break-word; align-self: flex-start; max-width: 85%; }
        .message.private { border: 1px dashed #ffc107; background: #2b2b1e; }
        .message span.author { font-weight: bold; margin-right: 5px; }

        /* Панель вводу */
        .input-area { padding: 10px; background: #1e1e1e; border-top: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        #message-text { flex: 1; padding: 12px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 4px; outline: none; }
        button { padding: 12px 20px; background: #007bff; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #recipient-badge { display: none; background: #ffc107; color: #000; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }

        /* Мобільна адаптація */
        @media (max-width: 600px) {
            .chat-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 100px; border-right: none; border-bottom: 1px solid #333; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; padding: 10px; align-items: center;}
            .user-online { display: inline-block; margin-bottom: 0; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Ідентифікація</h2>
            <input type="text" id="login-name" placeholder="Введіть позивний">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px; justify-content: center;">
                <label>Колір ніка:</label>
                <input type="color" id="login-color" value="#5bc0de" style="width: 50px; height: 40px; padding: 0;">
            </div>
            <button onclick="enterChat()">Увійти в систему</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div id="user-info">...</div>
            <button onclick="location.reload()" style="padding: 5px 10px; background: #dc3545;">Вийти</button>
        </div>

        <div class="chat-container">
            <div class="sidebar">
                <h4>Онлайн (клік для привату)</h4>
                <div id="online-users"></div>
            </div>

            <div id="messages"></div>
        </div>

        <div class="input-area">
            <div id="recipient-badge" onclick="clearRecipient()">Глобально</div>
            <input type="text" id="message-text" placeholder="Повідомлення..." autocomplete="off">
            <button onclick="sendMessage()">TX</button>
        </div>
    </div>

    <script>
        const socket = io();
        let myUsername = "";
        let myColor = "";
        let currentRecipient = null; // null = глобальний чат

        // 1. ВХІД У ЧАТ
        function enterChat() {
            const nameInput = document.getElementById('login-name').value.trim();
            if (!nameInput) return alert("Введіть позивний");

            myUsername = nameInput;
            myColor = document.getElementById('login-color').value;

            // Ховаємо логін, показуємо чат
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('user-info').innerHTML = `Позивний: <strong style="color:${myColor}">${myUsername}</strong>`;

            // Реєструємось на сокет-сервері
            socket.emit('register', { username: myUsername });

            // Завантажуємо історію
            loadHistory();
        }

        // 2. ЗАВАНТАЖЕННЯ ІСТОРІЇ
        async function loadHistory() {
            try {
                // Передаємо свій нік, щоб сервер віддав нам наші привати
                const response = await fetch(window.location.origin + `/api/messages?user=${myUsername}`);
                const history = await response.json();

                document.getElementById('messages').innerHTML = ''; // Чистимо екран
                history.forEach(msg => {
                    appendMessage(msg.username, msg.color, msg.text, msg.recipient);
                });
            } catch (error) {
                console.error("Помилка БД:", error);
            }
        }

        // 3. МАЛЮВАННЯ ПОВІДОМЛЕННЯ
        function appendMessage(user, color, text, recipient) {
            const messagesDiv = document.getElementById('messages');
            const msgElement = document.createElement('div');

            // Якщо є recipient - оформлюємо як приватне
            if (recipient) {
                msgElement.className = 'message private';
                msgElement.innerHTML = `<span class="author" style="color:${color}">${user} ➔ ${recipient}:</span> ${text}`;
            } else {
                msgElement.className = 'message';
                msgElement.innerHTML = `<span class="author" style="color:${color}">${user}:</span> ${text}`;
            }

            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // 4. ПРИЙОМ ПОВІДОМЛЕНЬ
        socket.on('receive_message', function(data) {
            appendMessage(data.username, data.color, data.text, data.recipient);
        });

        // 5. ОНОВЛЕННЯ СПИСКУ ОНЛАЙН
        socket.on('update_users', function(users) {
            const onlineDiv = document.getElementById('online-users');
            onlineDiv.innerHTML = '';

            users.forEach(user => {
                const uDiv = document.createElement('div');
                uDiv.className = 'user-online';
                // Виділяємо поточного співрозмовника
                if (user === currentRecipient) uDiv.classList.add('selected');

                uDiv.textContent = user;

                // Клік по юзеру - перехід у приват
                uDiv.onclick = () => setRecipient(user);
                onlineDiv.appendChild(uDiv);
            });

            // Якщо наший співрозмовник вийшов
            if (currentRecipient && !users.includes(currentRecipient)) {
                clearRecipient();
            }
        });

        // 6. УПРАВЛІННЯ ПРИВАТАМИ
        function setRecipient(user) {
            if (user === myUsername) return; // Самому собі не пишемо
            currentRecipient = user;

            const badge = document.getElementById('recipient-badge');
            badge.style.display = 'block';
            badge.textContent = `Приват: ${user} (✖)`;

            // Оновлюємо візуал в списку
            document.querySelectorAll('.user-online').forEach(el => {
                el.classList.remove('selected');
                if (el.textContent === user) el.classList.add('selected');
            });
        }

        function clearRecipient() {
            currentRecipient = null;
            document.getElementById('recipient-badge').style.display = 'none';
            document.querySelectorAll('.user-online').forEach(el => el.classList.remove('selected'));
        }

        // 7. ВІДПРАВКА
        function sendMessage() {
            const textInput = document.getElementById('message-text');
            const text = textInput.value.trim();

            if (!text) return;

            socket.emit('send_message', {
                username: myUsername,
                color: myColor,
                text: text,
                recipient: currentRecipient // Якщо null - полетить усім
            });
            textInput.value = '';
        }

        document.getElementById('message-text').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
