<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Pentagon Messenger</title>
    <style>
        :root { --bg: #0f0f0f; --side: #181818; --active: #2b5278; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 300px; background: var(--side); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #222; transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .chat-item:hover { background: #222; }
        .chat-item.active { background: var(--active); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* MAIN CHAT */
        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 70%; position: relative; }
        .msg.mine { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg.theirs { align-self: flex-start; background: #212121; border-bottom-left-radius: 2px; }
        .msg .sender-name { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }

        .input-bar { padding: 15px; background: var(--side); display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #222; color: #fff; outline: none; }
        
        /* SETTINGS MODAL */
        #settings-modal { display: none; position: absolute; top: 50px; left: 50px; background: #2a2a2a; padding: 20px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        
        /* AUTH SCREEN */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--side); padding: 30px; border-radius: 12px; width: 350px; text-align: center; }
        .auth-box input { width: 100%; margin-bottom: 10px; padding: 12px; background: #222; border: 1px solid #333; color: #fff; border-radius: 5px; }
        
        @media (max-width: 600px) {
            .sidebar { width: 80px; }
            .sidebar span { display: none; }
            .sidebar-header button { font-size: 10px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h2 id="auth-title">Вхід</h2>
            <input type="text" id="auth-user" placeholder="@username">
            <input type="text" id="auth-nick" placeholder="Display Name (для реєстрації)" style="display:none">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button onclick="handleAuth()" id="auth-btn">Увійти</button>
            <p onclick="toggleAuthMode()" style="cursor:pointer; font-size: 12px; color: #888; margin-top: 15px;">Немає акаунту? Реєстрація</p>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <span id="my-nick">...</span>
            <button onclick="toggleSettings()" style="background:none; border:none; color:#5bc0de; cursor:pointer">⚙️</button>
        </div>
        <div class="chat-list" id="chat-list">
            <div class="chat-item active" onclick="switchChat('global')">
                <div class="avatar" style="background:#444">G</div>
                <span>Глобальний чат</span>
            </div>
            </div>
    </div>

    <div class="main-container">
        <div id="settings-modal">
            <h3>Налаштування</h3>
            <input type="text" id="set-nick" placeholder="Новий нік">
            <input type="color" id="set-color" style="width: 100%; margin-bottom: 10px;">
            <button onclick="saveSettings()">Зберегти</button>
            <button onclick="toggleSettings()" style="background:#444">Закрити</button>
        </div>

        <div id="messages"></div>

        <div class="input-bar">
            <button title="Фото/Відео" onclick="alert('Для медіа підключи Cloudinary API')">📎</button>
            <input type="text" id="msg-input" placeholder="Повідомлення...">
            <button onclick="send()" id="send-btn">➤</button>
        </div>
    </div>

    <script>
        let me = JSON.parse(localStorage.getItem('p_user')) || null;
        let activeChat = 'global'; // 'global' або '@username'
        let socket = null;
        let isRegister = false;

        if (me) init();

        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? 'Реєстрація' : 'Вхід';
            document.getElementById('auth-nick').style.display = isRegister ? 'block' : 'none';
            document.getElementById('auth-btn').innerText = isRegister ? 'Створити акаунт' : 'Увійти';
        }

        async function handleAuth() {
            const username = document.getElementById('auth-user').value.trim();
            const password = document.getElementById('auth-pass').value;
            const nickname = document.getElementById('auth-nick').value.trim();

            const route = isRegister ? '/api/register' : '/api/login';
            const body = { username, password, nickname };

            const res = await fetch(window.location.origin + route, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (res.ok) {
                if (isRegister) { toggleAuthMode(); return alert("Тепер увійдіть!"); }
                me = data;
                localStorage.setItem('p_user', JSON.stringify(me));
                init();
            } else alert(data.error);
        }

        function init() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('my-nick').innerText = me.nickname;
            socket = io();
            socket.emit('join', { username: me.username });

            loadHistory();

            socket.on('new_msg', (data) => {
                // Малюємо лише якщо це активний чат
                const isGlobal = !data.recipient && activeChat === 'global';
                const isPrivate = data.recipient && (data.sender === activeChat || data.sender === me.username);
                if (isGlobal || isPrivate) appendMsg(data);
            });

            socket.on('update_online', (users) => {
                const list = document.getElementById('chat-list');
                // Очищаємо крім Глобалу
                list.innerHTML = `<div class="chat-item ${activeChat === 'global' ? 'active' : ''}" onclick="switchChat('global')">
                    <div class="avatar">G</div><span>Глобальний чат</span></div>`;
                
                users.forEach(u => {
                    if (u === me.username) return;
                    const div = document.createElement('div');
                    div.className = `chat-item ${activeChat === u ? 'active' : ''}`;
                    div.onclick = () => switchChat(u);
                    div.innerHTML = `<div class="avatar">${u[0].toUpperCase()}</div><span>${u}</span>`;
                    list.appendChild(div);
                });
            });
        }

        async function loadHistory() {
            const res = await fetch(window.location.origin + `/api/messages?user=${me.username}&other=${activeChat}`);
            const data = await res.json();
            document.getElementById('messages').innerHTML = '';
            data.forEach(appendMsg);
        }

        function switchChat(target) {
            activeChat = target;
            loadHistory();
            document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
            // Візуальний апдейт селектора
        }

        function appendMsg(m) {
            const div = document.createElement('div');
            const isMine = (m.sender === me.username || m.username === me.username);
            div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
            div.innerHTML = `<span class="sender-name" style="color:${m.color}">${m.sender || m.username}</span>${m.text}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function send() {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            const data = {
                sender: me.username,
                recipient: activeChat === 'global' ? null : activeChat,
                text: input.value,
                color: me.color,
                type: 'text'
            };
            socket.emit('send_msg', data);
            input.value = '';
        }

        function toggleSettings() {
            const m = document.getElementById('settings-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        async function saveSettings() {
            const nickname = document.getElementById('set-nick').value || me.nickname;
            const color = document.getElementById('set-color').value;
            const res = await fetch(window.location.origin + '/api/update_profile', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: me.username, nickname, color })
            });
            if (res.ok) {
                me.nickname = nickname; me.color = color;
                localStorage.setItem('p_user', JSON.stringify(me));
                location.reload();
            }
        }
    </script>
</body>
</html>
